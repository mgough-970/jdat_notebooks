name: Filtered execution testing

on:
  workflow_dispatch:
    inputs:
      path:
        description: 'Path to a Jupyter notebook or a requirements.txt file'
        required: true
        type: string

jobs:
  execute-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install nbconvert pytest pytest-nbval

      - name: Process File for Notebook Execution & Validation
        run: |
          FILE_PATH="${{ github.event.inputs.path }}"
          DIR_PATH=$(dirname "$FILE_PATH")
          
          if [[ "$FILE_PATH" == *.ipynb ]]; then
            echo "Processing single notebook: $FILE_PATH"
            jupyter nbconvert --execute --to notebook --inplace "$FILE_PATH"
            pytest --nbval "$FILE_PATH"
          
          elif [[ "$(basename "$FILE_PATH")" == "requirements.txt" ]]; then
            echo "Processing requirements file: $FILE_PATH"
            pip install -r "$FILE_PATH"
            for nb in "$DIR_PATH"/*.ipynb; do
              echo "Executing and validating $nb"
              jupyter nbconvert --execute --to notebook --inplace "$nb"
              pytest --nbval "$nb"
            done
          
          else
            echo "File type not recognized for testing. Skipping tests gracefully."
            exit 0
          fi
